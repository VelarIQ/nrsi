name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  policy-files:
    name: OSS policy files present
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify required files
        run: |
          set -euo pipefail
          for f in LICENSE README.md CONTRIBUTING.md CODE_OF_CONDUCT.md SECURITY.md GOVERNANCE.md MAINTAINERS.md PATENTS.md TRADEMARKS.md CHANGELOG.md ROADMAP.md SUPPORT.md; do
            test -f "$f" || (echo "Missing required file: $f" && exit 1)
          done

  tests:
    name: Python tests (baseline)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r global-rollout/requirements.txt
      - name: Run baseline tests
        run: |
          python -m pytest global-rollout/tests/test_nrsi_lang.py -v --maxfail=1

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
